name: Publish Python Package

# Triggered when a GitHub Release is published in the UI. Tag the release
# `vX.Y.Z` and make sure datamind/__init__.py's __version__ matches X.Y.Z
# before clicking publish — the Trusted Publisher rejects mismatched tags.
#
# Authentication uses PyPI's Trusted Publisher (OIDC). Configure once at:
#   https://pypi.org/manage/account/publishing/
# with:
#   PyPI Project Name:  datamind
#   GitHub repo owner:  OpenDCAI
#   GitHub repo name:   DataMind
#   Workflow filename:  python-publish.yml
#   Environment name:   pypi
# Then create the matching environment in GitHub repo Settings → Environments.

on:
  release:
    types: [published]
  workflow_dispatch:        # allow manual dry-runs from the Actions tab

jobs:
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: twine check
        run: twine check dist/*

      - name: List artifacts
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    name: Publish to PyPI
    needs: release-build
    runs-on: ubuntu-latest
    # Only run on real releases, not manual dispatches — keeps the workflow
    # safe to test from the Actions tab without accidental uploads.
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write       # OIDC token for PyPI Trusted Publisher
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
